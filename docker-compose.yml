version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Your_Strong_Password_123!
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Your_Strong_Password_123!", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: inventorysalesapi-api
    container_name: inventorysalesapi_api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=InventorySalesDb;User Id=sa;Password=Your_Strong_Password_123!;TrustServerCertificate=True;
      - JwtSettings__Secret=SuperSecretKeyForInventorySalesApiProjectMustBeAtLeast32BytesLong!
      - JwtSettings__Issuer=InventorySalesApi
      - JwtSettings__Audience=InventorySalesApi.Users
      - JwtSettings__ExpiryInMinutes=60
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      sqlserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mssql_data:
